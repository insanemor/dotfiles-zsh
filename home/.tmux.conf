# ~/.tmux.conf
# =====================================================================
#  Configuracao do tmux  —  basica, amigavel e com plugins
# =====================================================================

# --- Prefixo: troca de Ctrl-b para Ctrl-a (mais facil de alcancar) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Comportamento geral ---
set -g mouse on                 # habilita mouse (clicar painel, redimensionar, scroll)
set -g base-index 1             # janelas comecam em 1 (nao em 0)
setw -g pane-base-index 1       # paineis comecam em 1
set -g renumber-windows on      # renumera janelas ao fechar uma
set -g history-limit 10000      # mais linhas de scrollback
set -sg escape-time 10          # responde mais rapido a teclas (ex: ESC no vim)
set -g focus-events on
set -g set-clipboard on

# --- Cores (terminal moderno com 256 cores / truecolor) ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# --- Recarregar config com prefixo + r ---
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config recarregada!"

# =====================================================================
#  Dividir paineis  (varios atalhos pra garantir que funcione)
# =====================================================================
unbind '"'
unbind %
# prefixo + |  ou  prefixo + \   ->  divide na VERTICAL (lado a lado)
bind | split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
# prefixo + -  ou  prefixo + _   ->  divide na HORIZONTAL (cima/baixo)
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Nova janela tambem mantem o diretorio atual
bind c new-window -c "#{pane_current_path}"

# --- Navegar entre paineis com Alt + setas (sem prefixo) ---
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# --- Tambem navegar com prefixo + h/j/k/l (estilo vim) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Redimensionar paineis com prefixo + Shift+H/J/K/L (repetivel) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Zoom no painel atual (tela cheia temporaria): prefixo + z ---
# (ja e padrao do tmux, deixado aqui como lembrete)

# --- Navegar entre janelas com Shift + setas (sem prefixo) ---
bind -n S-Left  previous-window
bind -n S-Right next-window

# =====================================================================
#  Sessoes  (criar / trocar / renomear / fechar)
# =====================================================================
# prefixo + Ctrl-n  ->  nova sessao, pergunta o nome
bind C-n command-prompt -p "Nome da nova sessao:" "new-session -s '%%'"
# prefixo + N        ->  nova sessao rapida (nome automatico)
bind N new-session
# prefixo + R        ->  renomear a sessao atual
bind R command-prompt -I "#S" -p "Novo nome da sessao:" "rename-session '%%'"
# prefixo + X        ->  fechar a sessao atual (com confirmacao)
bind X confirm-before -p "Matar a sessao '#S'? (y/n)" kill-session
# prefixo + g        ->  ir para uma sessao pelo nome (autocompleta)
bind g command-prompt -p "Ir para sessao:" "switch-client -t '%%'"
# prefixo + G        ->  abre lazygit (TUI estilo Source Control) num popup
#                         flutuante por cima do painel atual. Fecha ao sair.
#                         O popup roda como filho do tmux (NAO do shell), entao
#                         passamos o PATH completo para garantir que o binario
#                         seja encontrado mesmo se o tmux foi iniciado antes do
#                         brew shellenv carregar.
bind G display-popup -E -w 90% -h 90% -d '#{pane_current_path}' \
  "PATH=$HOME/.asdf/shims:$HOME/.bun/bin:$HOME/.opencode/bin:$HOME/.npm-global/bin:/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/usr/local/bin:/usr/bin:/bin lazygit"

# --- Alternar sessoes com Ctrl + setas cima/baixo (SEM prefixo) ---
# Ctrl + Up    -> sessao anterior
# Ctrl + Down  -> proxima sessao
bind -n C-Up   switch-client -p
bind -n C-Down switch-client -n
# Opcional: usar Ctrl + esquerda/direita em vez de cima/baixo.
# ATENCAO: conflita com "pular palavra" (Ctrl+Left/Right) no shell/editor.
# bind -n C-Left  switch-client -p
# bind -n C-Right switch-client -n

# Lembretes (ja sao padrao do tmux):
#   prefixo + s   -> lista interativa de sessoes (setas + Enter)
#   prefixo + (   -> sessao anterior
#   prefixo + )   -> proxima sessao
#   prefixo + L   -> alterna com a ultima sessao usada (aqui L e resize; use ( e ) )

# --- Opcional: Ctrl-n SEM prefixo (descomente se quiser) ---
# ATENCAO: captura o Ctrl-n globalmente e pode atrapalhar vim/shell.
# bind -n C-n command-prompt -p "Nome da nova sessao:" "new-session -s '%%'"

# --- Modo copia estilo vim ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# =====================================================================
#  Barra de status  —  estilo "kitty" (powerline slanted, tab no topo)
#  Cores extraidas do tema ativo: ~/.config/kitty/current-theme.conf
# =====================================================================
set -g status-interval 5
set -g status-position top          # = tab_bar_edge top do kitty
set -g status-justify left

# Fundo da barra = inactive_tab_background do kitty (#181636)
set -g status-style "bg=#181636,fg=#f8dbc0"

# --- Sessao (canto esquerdo): bloco dourado + slant  ---
set -g status-left-length 220
set -g status-left "#[fg=#1e1c44,bg=#eebf37,bold] #S #[fg=#eebf37,bg=#181636,nobold] #(~/.tmux-claude-usage.sh) #(~/.tmux-minimax-usage.sh) "

# --- Relogio + continuum (canto direito): bloco oliva com slant  ---
set -g @env_info ""
set -g status-right-length 250
set -g status-right "#{@env_info}#[fg=#6f6a4e,bg=#181636]#[fg=#f8dbc0,bg=#6f6a4e]  %d/%m  #[fg=#eeeeee,bold]%H:%M "

# --- Abas: ativa = caixa oliva com slant (igual active_tab do kitty) ---
setw -g window-status-current-format "#[fg=#6f6a4e,bg=#181636]#[fg=#eeeeee,bg=#6f6a4e,bold] #I:#W #[fg=#6f6a4e,bg=#181636]"
# abas inativas: planas (inactive_tab_background == fundo da barra)
setw -g window-status-format "#[fg=#f8dbc0,bg=#181636] #I:#W "
setw -g window-status-separator ""

# =====================================================================
#  Bordas dos paineis  (aproximacao do "split" do kitty)
#  OBS: o tmux NAO tem margem/espaco real entre paineis (so 1 linha de
#       borda). Destacamos a borda ativa pra simular a separacao.
# =====================================================================
set -g pane-border-lines heavy                 # linha mais grossa: single|double|heavy|simple
set -g pane-border-indicators colour           # realca a borda do painel ativo
set -g pane-border-style "fg=#3b3a52"          # painel inativo: discreto
set -g pane-active-border-style "fg=#eebf37"   # painel ativo: dourado (destaque)

# =====================================================================
#  PLUGINS (gerenciados pelo TPM)
# =====================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'    # ajustes sensatos de base
set -g @plugin 'tmux-plugins/tmux-yank'        # copiar p/ clipboard do sistema
set -g @plugin 'tmux-plugins/tmux-resurrect'   # salvar/restaurar sessoes
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save + auto-restore

# --- Config dos plugins ---
set -g @continuum-restore 'on'        # restaura a ultima sessao ao iniciar o tmux
set -g @continuum-save-interval '15'  # salva automaticamente a cada 15 min
set -g @resurrect-capture-pane-contents 'on'  # restaura tambem o conteudo dos paineis
set -g @yank_selection_mouse 'clipboard'      # selecao com mouse vai pro clipboard

# Inicializa o TPM (mantenha esta linha por ULTIMO no arquivo)
run '~/.tmux/plugins/tpm/tpm'
