# lazygit — config versionada nos dotfiles
# Vai para ~/.config/lazygit/config.yml (symlink criado pelo install.sh).
gui:
  # Mostra TODOS os painéis de lista juntos na coluna esquerda
  # (Status, Files, Branches, Commits, Stash).
  expandFocusedSidePanel: false
  # A coluna das listas ocupa ~65% da largura -> o painel [0] Diff vira uma
  # faixa estreita à direita (não dá pra escondê-lo de vez, mas fica pequeno).
  sidePanelWidth: 0.65
  # Esconde o painel de log de comandos -> interface mais limpa.
  showCommandLog: false
  # Ícones Nerd Font (você tem a FiraCode Nerd Font instalada).
  nerdFontsVersion: "3"

  # Tema combinando com o kitty (laranja + roxo/lavanda).
  theme:
    activeBorderColor:
      - "#ff9738"
      - bold
    inactiveBorderColor:
      - "#544a65"
    searchingActiveBorderColor:
      - "#eebf37"
      - bold
    optionsTextColor:
      - "#b6a0ff"
    selectedLineBgColor:
      - "#353146"
    inactiveViewSelectedLineBgColor:
      - "#2a2738"
    cherryPickedCommitFgColor:
      - "#1f1c27"
    cherryPickedCommitBgColor:
      - "#b6a0ff"
    markedBaseCommitFgColor:
      - "#1f1c27"
    markedBaseCommitBgColor:
      - "#eebf37"
    unstagedChangesColor:
      - "#fc5e59"
    defaultFgColor:
      - "#f8dbc0"
