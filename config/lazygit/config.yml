# lazygit — config versionada nos dotfiles
# Vai para ~/.config/lazygit/config.yml (symlink criado pelo install.sh).
gui:
  # Painel em foco DOMINA a tela; os demais encolhem para 1 linha.
  # Na prática vira a experiência "só files/branches/commits" ao navegar
  # com as teclas 2 / 3 / 4 (o Status e o Stash ficam minimizados).
  expandFocusedSidePanel: true
  expandedSidePanelWeight: 2
  # Esconde o painel de log de comandos -> interface mais limpa.
  showCommandLog: false
  # Ícones Nerd Font (você tem a FiraCode Nerd Font instalada).
  nerdFontsVersion: "3"

  # Tema combinando com o kitty (laranja + roxo/lavanda).
  theme:
    activeBorderColor:
      - "#ff9738"
      - bold
    inactiveBorderColor:
      - "#544a65"
    searchingActiveBorderColor:
      - "#eebf37"
      - bold
    optionsTextColor:
      - "#b6a0ff"
    selectedLineBgColor:
      - "#353146"
    inactiveViewSelectedLineBgColor:
      - "#2a2738"
    cherryPickedCommitFgColor:
      - "#1f1c27"
    cherryPickedCommitBgColor:
      - "#b6a0ff"
    markedBaseCommitFgColor:
      - "#1f1c27"
    markedBaseCommitBgColor:
      - "#eebf37"
    unstagedChangesColor:
      - "#fc5e59"
    defaultFgColor:
      - "#f8dbc0"
